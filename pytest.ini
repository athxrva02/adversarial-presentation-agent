[pytest]
# Register custom marks so pytest doesn't emit PytestUnknownMarkWarning
markers =
    integration: marks tests that require external services or real model downloads (deselect with -m "not integration")
    live: marks tests that call a running Ollama server (deselect with -m "not live")
    analysis: marks analysis pipeline tests

# Silence the pydantic model_name namespace warning — it is benign for this project
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
    ignore::UserWarning:pydantic
